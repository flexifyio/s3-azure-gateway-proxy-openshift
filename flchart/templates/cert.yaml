apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.cert.secretName }}
  namespace: {{ .Values.namespace }} 
spec:
  #commonName: "x.xx.x.xx"
  dnsNames:
{{- range .Values.spec.dnsNames }}
    - {{ . }}
{{- end }}
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: paas
  secretName: {{ .Values.cert.secretName }} 
  usages:
    - digital signature
    - key encipherment
 